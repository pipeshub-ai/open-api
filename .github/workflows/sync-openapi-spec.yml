name: Sync OpenAPI Spec from upstream

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-spec:
    name: Sync OpenAPI spec from pipeshub-ai
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can switch branches easily
          fetch-depth: 0

      - name: Fetch upstream spec
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/pipeshub-ai/pipeshub-ai/main/backend/nodejs/apps/src/modules/api-docs/pipeshub-openapi.yaml" \
            -o /tmp/upstream-openapi.yaml

      - name: Check for differences
        id: diff
        run: |
          if diff -q source_specs/pipeshub-openapi.yaml /tmp/upstream-openapi.yaml > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Create/Switch to the sync branch
          git checkout -B auto/sync-openapi-spec
          
          # 2. Sync the file
          cp /tmp/upstream-openapi.yaml source_specs/pipeshub-openapi.yaml
          
          # 3. Commit
          git add source_specs/pipeshub-openapi.yaml
          git commit -m "chore: sync OpenAPI spec from upstream pipeshub-ai" || echo "No changes to commit"
          
          # 4. Use --force to overwrite the stale remote branch
          # In a sync bot context, --force is safer than --force-with-lease 
          # because we expect to overwrite the automated branch anyway.
          git push origin auto/sync-openapi-spec --force

      - name: Create or Update Pull Request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use 'gh pr create' with error handling if it already exists
          gh pr create \
            --base main \
            --head auto/sync-openapi-spec \
            --title "chore: sync OpenAPI spec from upstream" \
            --body "This PR was automatically created to sync the OpenAPI spec from upstream." \
            || echo "PR already exists, skipping creation."

      - name: Summary
        if: always()
        run: |
          echo "### OpenAPI Spec Sync Summary" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.diff.outputs.changed }}" == "true" ]; then
            echo "✅ Upstream changes detected and pushed to branch." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✨ No changes detected." >> "$GITHUB_STEP_SUMMARY"
          fi
